<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python description</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f9;
            color: #333;
            line-height: 1.6;
        }
        
        .header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        .slideshow-container {
            position: relative;
            max-width: 100%;
            margin: auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        
        .mySlides {
            display: none;
            width: 100%;
        }
        
        .mySlides img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px 20px;
            color: white;
            font-weight: bold;
            font-size: 20px;
            border-radius: 0 6px 6px 0;
            user-select: none;
            background-color: rgba(0,0,0,0.6);
            transition: 0.3s;
        }
        
        .next {
            right: 0;
            border-radius: 6px 0 0 6px;
        }
        
        .prev:hover, .next:hover {
            background-color: rgba(0,0,0,0.8);
        }
        
        .dots {
            text-align: center;
            padding: 20px 0;
        }
        
        .dot {
            cursor: pointer;
            height: 15px;
            width: 15px;
            margin: 0 4px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.3s ease;
        }
        
        .dot.active {
            background-color: #3498db;
        }
        
        .caption {
            text-align: center;
            margin-top: 1rem;
            font-size: 1.1rem;
            color: #555;
        }
        
        footer {
            text-align: center;
            padding: 2rem;
            color: #777;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>describe python</h1>
        <p>basic python language</p>
    </div>

    <div class="container">
        <div class="slideshow-container" id="slideshow">
            <!-- Slides populated by JS -->
        </div>
        
        <div class="dots" id="dots-container"></div>
        
        <div class="caption">
            page <span id="current-slide">1</span> 
        </div>
    </div>

    <footer>
        <p>Powered by GitHub Pages • Made with ❤️</p>
    </footer>

    <script>
        const slides = [
            { src: "slides/slide-1.png", caption: "page1" },
            { src: "slides/slide-2.png", caption: "page2" },
            { src: "slides/slide-3.png", caption: "page3" },
            { src: "slides/slide-4.png", caption: "page4" },
            { src: "slides/slide-5.png", caption: "page5" }
        ];

        let currentSlide = 0;

        function showSlides() {
            const container = document.getElementById('slideshow');
            container.innerHTML = '';
            
            slides.forEach((slide, index) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = `mySlides ${index === 0 ? 'active' : ''}`;
                slideDiv.style.display = index === 0 ? 'block' : 'none';
                slideDiv.innerHTML = `<img src="${slide.src}" alt="Slide ${index + 1}">`;
                container.appendChild(slideDiv);
            });
            
            // Navigation buttons
            const prev = document.createElement('a');
            prev.className = 'prev';
            prev.innerHTML = '&#10094;';
            prev.onclick = () => plusSlides(-1);
            
            const next = document.createElement('a');
            next.className = 'next';
            next.innerHTML = '&#10095;';
            next.onclick = () => plusSlides(1);
            
            container.appendChild(prev);
            container.appendChild(next);
            
            updateDots();
        }

        function updateDots() {
            const dotsContainer = document.getElementById('dots-container');
            dotsContainer.innerHTML = '';
            slides.forEach((_, i) => {
                const dot = document.createElement('span');
                dot.className = `dot ${i === currentSlide ? 'active' : ''}`;
                dot.onclick = () => currentSlideIndex(i);
                dotsContainer.appendChild(dot);
            });
        }

        function plusSlides(n) {
            currentSlide = (currentSlide + n + slides.length) % slides.length;
            showCurrentSlide();
        }

        function currentSlideIndex(n) {
            currentSlide = n;
            showCurrentSlide();
        }

        function showCurrentSlide() {
            const slideElements = document.getElementsByClassName('mySlides');
            for (let i = 0; i < slideElements.length; i++) {
                slideElements[i].style.display = "none";
            }
            slideElements[currentSlide].style.display = "block";
            document.getElementById('current-slide').textContent = currentSlide + 1;
            updateDots();
        }

        // Keyboard support
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') plusSlides(-1);
            if (e.key === 'ArrowRight') plusSlides(1);
        });

        window.onload = () => {
            showSlides();
        };
    </script>
</body>
</html>
